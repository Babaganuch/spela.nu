<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jag vill spela.nu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <header>
            <div class="logo">
                <div class="logo-shape"></div>
                <div class="logo-eyes">
                    <div class="eye"></div>
                    <div class="eye"></div>
                </div>
            </div>
            <h1 class="rainbow-text">Jag vill spela.nu</h1>
        </header>
        
        <div class="games-grid">
            <div id="loading-indicator" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 1.5rem; background: rgba(0,0,0,0.7); padding: 20px; border-radius: 10px; display: none;">
                Laddar spel...<br>
                <span style="font-size: 1rem;">Vänligen vänta</span>
            </div>
            <button class="game-button snake" onclick="loadGame('snake')" disabled>
                <span class="game-icon">🐍</span>
                <span>Snake IO</span>
            </button>
            <button class="game-button geometry-dash" onclick="loadGame('geometry-dash')" disabled>
                <span class="game-icon">🔷</span>
                <span>Geometry Dash Lite</span>
            </button>
            <button class="game-button go-around" onclick="loadGame('go-around')" disabled>
                <span class="game-icon">🎮</span>
                <span>Go Around</span>
            </button>
            <button class="game-button beaver-clicker" onclick="loadGame('beaver-clicker')" disabled>
                <span class="game-icon">🦫</span>
                <span>Bäver Clicker</span>
            </button>
            <button class="game-button flappy-bird" onclick="loadGame('flappy-bird')" disabled>
                <span class="game-icon">🐦</span>
                <span>Flappy Bird</span>
            </button>
            <button class="game-button block-blast" onclick="loadGame('block-blast')" disabled>
                <span class="game-icon">🧱</span>
                <span>Block Blast</span>
            </button>
            <button class="game-button game-2048" onclick="loadGame('2048')" disabled>
                <span class="game-icon">🔢</span>
                <span>2048</span>
            </button>
            <button class="game-button tic-tac-toe" onclick="loadGame('tic-tac-toe')" disabled>
                <span class="game-icon">❌⭕</span>
                <span>Tick Tack Go</span>
            </button>
            <button class="game-button shark-clicker" onclick="loadGame('shark-clicker')" disabled>
                <span class="game-icon">🦈</span>
                <span>Haj Clicker</span>
            </button>
        </div>
    </div>
    
    <div id="game-container"></div>
    
    <script src="script.js"></script>
</body>
</html>
